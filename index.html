<!DOCTYPE html>
<html lang="my">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>For My Queen</title>
    <style>
        body {
            margin: 0; padding: 0; display: flex; justify-content: center; align-items: center; min-height: 100vh;
            background: linear-gradient(135deg, #fbc2eb 0%, #a6c1ee 100%);
            font-family: 'Segoe UI', Arial, sans-serif; text-align: center; color: #444; overflow-x: hidden;
        }
        .container {
            background: rgba(255, 255, 255, 0.9); padding: 30px; border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1); max-width: 450px; width: 90%; z-index: 10;
        }
        #counter { font-size: 2.5rem; font-weight: bold; color: #ff4d6d; margin: 15px 0; }
        
        /* Profile Image */
        .profile-img { 
            width: 120px; height: 120px; border-radius: 50%; object-fit: cover; 
            border: 5px solid #fff; box-shadow: 0 5px 15px rgba(0,0,0,0.2);
            margin-bottom: 15px;
        }
        
        /* Music Player */
        .music-player { margin: 20px 0; background: #fff0f3; padding: 10px; border-radius: 15px; }
        audio { width: 100%; height: 35px; }

        .quiz-sec { margin-top: 20px; border-top: 2px dashed #ffb3c1; padding-top: 20px; min-height: 250px; }
        .btn {
            background: #ff4d6d; color: white; border: none; padding: 12px;
            border-radius: 25px; cursor: pointer; margin: 8px; transition: 0.3s; width: 90%; font-size: 1rem;
        }
        .btn:hover { background: #ff758f; transform: scale(1.03); }
        #result { margin-top: 15px; font-weight: bold; font-size: 1.1rem; min-height: 50px; }
        
        .heart { position: fixed; top: -10%; font-size: 20px; animation: fall linear infinite; z-index: 1; pointer-events: none; }
        @keyframes fall { to { transform: translateY(110vh) rotate(360deg); } }
        
        .lyrics { font-style: italic; color: #777; font-size: 0.9rem; margin-top: 10px; }
    </style>
</head>
<body>

<div class="container">
    <img src="https://i.ibb.co/q6gL2pM/q6gL2pM.jpg" alt="My Queen" class="profile-img">

    <div class="music-player">
        <audio id="myAudio" controls loop>
            <source src="https://github.com/Shineminthant123/for-my-queen/raw/main/Tiktok_1775405450861.mp3" type="audio/mpeg">
            Your browser does not support the audio element.
        </audio>
        <p style="font-size: 0.8rem; color: #ff4d6d; font-weight: bold; margin-top: 5px;">Listen to our song 🎶</p>
    </div>

    <div style="font-size: 30px;">💖</div>
    <h2>Together Since 8.3.2026</h2>
    <div id="counter">0 Days</div>
    
    <div class="quiz-sec" id="quiz-container">
        <h3 id="quiz-title">Quick Quiz for You! ✨</h3>
        <p id="question"></p>
        <div id="options"></div>
        <div id="result"></div>
    </div>

    <div class="lyrics">
        "Darling, you look perfect tonight..."
    </div>
</div>

<script>
    // ရက်ပေါင်းတွက်ချက်ခြင်း
    const startDate = new Date(2026, 2, 8); 
    function updateCounter() {
        const diff = new Date() - startDate;
        const days = Math.floor(diff / (1000 * 60 * 60 * 24));
        document.getElementById('counter').innerText = (days >= 0 ? days : 0) + " ရက်";
    }

    // Quiz Data
    const quizData = [
        { q: "ကိုယ်တို့ နှစ်ယောက် အမှတ်တရ စဆုံခဲ့တဲ့ နေရာက?", options: ["ကျောင်းရှေ့", "Bus ကားပေါ်", "ဘုရားပေါ်"], correct: 2 },
        { q: "ကိုယ်တို့ရဲ့ First Date နေ့လေးက?", options: ["မတ်လ ၂၇ ရက်", "မတ်လ ၂၀ ရက်", "ဧပြီလ ၁ ရက်"], correct: 0 },
        { q: "ကိုယ် မင်းကို ပေးခဲ့တဲ့ ပထမဆုံး လက်ဆောင်က?", options: ["ပန်းစည်း", "နှုတ်ခမ်းနီ", "Key Chain"], correct: 1 }
    ];

    let currentQuestion = 0;

    function loadQuiz() {
        const qElement = document.getElementById('question');
        const optElement = document.getElementById('options');
        const resElement = document.getElementById('result');
        
        resElement.innerText = ""; 
        optElement.innerHTML = "";
        
        if (currentQuestion < quizData.length) {
            const current = quizData[currentQuestion];
            qElement.innerText = current.q;
            current.options.forEach((opt, index) => {
                const button = document.createElement('button');
                button.innerText = opt;
                button.className = 'btn';
                button.onclick = () => checkAns(index);
                optElement.appendChild(button);
            });
        } else {
            document.getElementById('quiz-container').innerHTML = "<h3>အကုန်မှန်တယ်! တော်လိုက်တာ ❤️</h3><p style='color:#ff4d6d; font-size:1.2rem;'>မင်းကို အရမ်းချစ်တယ်နော် My Queen!</p>";
        }
    }

    function checkAns(idx) {
        const res = document.getElementById('result');
        const audio = document.getElementById('myAudio');
        
        // ပထမဆုံးအဖြေနှိပ်တာနဲ့ သီချင်းစဖွင့်ပေးခြင်း
        audio.play().catch(e => console.log("Autoplay blocked, user interaction required."));

        if(idx === quizData[currentQuestion].correct) {
            res.innerHTML = "မှန်သွားပြီ! ❤️";
            res.style.color = "#2a9d8f";
            currentQuestion++;
            setTimeout(loadQuiz, 1000);
        } else {
            res.innerText = "မှားသွားပြီ... ပြန်စဉ်းစားကြည့်ဦး 😜";
            res.style.color = "#e76f51";
        }
    }

    // နှလုံးသား Animation
    function createHeart() {
        const heart = document.createElement('div');
        heart.className = 'heart';
        heart.innerHTML = '❤️';
        heart.style.left = Math.random() * 100 + 'vw';
        heart.style.animationDuration = (Math.random() * 3 + 2) + 's';
        document.body.appendChild(heart);
        setTimeout(() => heart.remove(), 5000);
    }

    setInterval(updateCounter, 1000);
    setInterval(createHeart, 400);
    updateCounter();
    loadQuiz();
</script>

</body>
</html>
