<!DOCTYPE html>
<html lang="my">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>For My Queen - 1 Month Anniversary</title>
    <style>
        :root {
            --primary-color: #ff4d6d;
            --secondary-color: #ff758f;
            --bg-gradient: linear-gradient(135deg, #fff5f7 0%, #fbc2eb 100%);
            --container-bg: rgba(255, 255, 255, 0.98);
        }

        body {
            margin: 0; padding: 0; display: flex; justify-content: center; align-items: center; min-height: 100vh;
            background: var(--bg-gradient);
            font-family: 'Segoe UI', Arial, sans-serif; text-align: center; color: #444; overflow-x: hidden;
        }

        .container {
            background: var(--container-bg); padding: 35px 25px; border-radius: 30px;
            box-shadow: 0 15px 40px rgba(255, 77, 109, 0.2); max-width: 420px; width: 90%; z-index: 10;
            position: relative; border: 3px solid #fff; transition: 0.5s;
        }

        /* Anniversary Glow Effect */
        .anni-active {
            border: 3px solid #ff4d6d !important;
            animation: glow 2s infinite alternate;
        }
        @keyframes glow { 
            from { box-shadow: 0 0 10px #ff4d6d; } 
            to { box-shadow: 0 0 30px #ff758f, 0 0 40px #ffb3c1; } 
        }

        #anni-banner {
            background: linear-gradient(45deg, #ff4d6d, #ff758f);
            color: white; padding: 12px; border-radius: 15px;
            font-weight: bold; margin-bottom: 15px; display: none; 
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
            animation: popIn 0.8s cubic-bezier(0.17, 0.89, 0.32, 1.49);
        }
        @keyframes popIn { from { transform: scale(0); } to { transform: scale(1); } }

        .profile-img {
            width: 150px; height: 150px; border-radius: 50%; object-fit: cover;
            border: 6px solid #fff; box-shadow: 0 5px 15px rgba(0,0,0,0.1); margin-bottom: 15px;
        }

        #counter { font-size: 2.2rem; font-weight: bold; color: var(--primary-color); margin: 10px 0; }
        .days-label { font-size: 1rem; color: #888; margin-bottom: 20px; }

        .music-player { margin: 20px 0; background: #fff0f3; padding: 15px; border-radius: 20px; border: 1px solid #ffb3c1; }
        audio { width: 100%; height: 40px; }

        .quiz-sec { border-top: 2px dashed #ffb3c1; padding-top: 20px; margin-top: 20px; min-height: 280px; }
        .btn {
            background: var(--primary-color); color: white; border: none; padding: 12px;
            border-radius: 25px; cursor: pointer; margin: 8px 0; width: 100%; font-size: 1rem;
            transition: 0.3s; box-shadow: 0 4px 8px rgba(255, 77, 109, 0.2);
        }
        .btn:hover { background: var(--secondary-color); transform: translateY(-2px); }

        .heart { position: fixed; top: -10%; font-size: 20px; animation: fall linear infinite; z-index: 1; pointer-events: none; }
        @keyframes fall { to { transform: translateY(110vh) rotate(360deg); } }

        .lyrics-box { font-style: italic; color: #777; font-size: 0.9rem; margin-top: 15px; min-height: 40px; line-height: 1.4; }
    </style>
</head>
<body>

<div class="container" id="main-card">
    <div id="anni-banner">🎉 Happy 1 Month Anniversary! 🎉</div>
    <img src="queen.jpg" alt="My Queen" class="profile-img">
    
    <div class="music-player">
        <audio id="myAudio" controls loop>
            <source src="https://github.com/Shineminthant123/for-my-queen/raw/main/Tiktok_1775405450861.mp3" type="audio/mpeg">
        </audio>
        <p style="font-size: 0.85rem; color: #ff4d6d; font-weight: bold; margin-top: 5px;">သီချင်းလေး ဖွင့်ပေးပါဦး ခလေးလေး 🎵</p>
    </div>

    <div id="counter">0 Days</div>
    <div class="days-label">Since 8 March 2026 ❤️</div>

    <div class="quiz-sec" id="quiz-container">
        <h3 style="font-size: 1.1rem;">တို့နှစ်ယောက်အကြောင်း ဘယ်လောက်သိလဲ? ✨</h3>
        <p id="question" style="font-weight: 500;"></p>
        <div id="options"></div>
        <div id="result" style="margin-top: 10px; font-weight: bold; min-height: 30px;"></div>
    </div>

    <div class="lyrics-box" id="typing-lyrics"></div>
</div>

<script>
    // စတင်တွဲခဲ့တဲ့ရက် (March 8, 2026)
    const startDate = new Date(2026, 2, 8); 

    function updateLogic() {
        const today = new Date();
        
        // --- TEST MODE (အစမ်းကြည့်ရန်) ---
        // ဒီနေ့ကို April 8 လို့ ယာယီသတ်မှတ်ပြီး စမ်းသပ်တာပါ
        const testDate = new Date(2026, 3, 8); 
        const checkDate = testDate; // အစစ်အတိုင်းကြည့်ချင်ရင် testDate နေရာမှာ today ပြောင်းပါ
        // ------------------------------

        const diff = checkDate - startDate;
        const totalDays = Math.floor(diff / (1000 * 60 * 60 * 24));
        
        document.getElementById('counter').innerText = (totalDays >= 0 ? totalDays : 0) + " ရက်မြောက်နေ့";

        // တစ်လပြည့်နေ့ စစ်ဆေးခြင်း
        if (checkDate.getDate() === 8 && totalDays > 0) {
            const months = (checkDate.getFullYear() - startDate.getFullYear()) * 12 + (checkDate.getMonth() - startDate.getMonth());
            if (months > 0) {
                const banner = document.getElementById('anni-banner');
                banner.innerText = `🎉 Happy ${months} Month Anniversary! 🎉`;
                banner.style.display = 'block';
                document.getElementById('main-card').classList.add('anni-active');
                startConfetti();
            }
        }
    }

    const quizData = [
        { q: "ကိုယ်တို့ စတွဲခဲ့တဲ့ နေ့လေးက?", options: ["မတ်လ ၇ ရက်", "မတ်လ ၈ ရက်", "မတ်လ ၉ ရက်"], correct: 1 },
        { q: "ကိုယ် ခလေးကို အမြဲတမ်း ခေါ်တဲ့ နာမည်က?", options: ["ဝက်ကလေး", "ခလေးလေး", "အသည်းလေး"], correct: 1 },
        { q: "ဒီနေ့က ကိုယ်တို့အတွက် ဘာနေ့လေးလဲ?", options: ["Anniversary", "ရိုးရိုးနေ့", "Birthday"], correct: 0 }
    ];

    let currentQ = 0;
    function loadQuiz() {
        const qEl = document.getElementById('question');
        const optEl = document.getElementById('options');
        const resEl = document.getElementById('result');

        if (currentQ < quizData.length) {
            qEl.innerText = quizData[currentQ].q;
            optEl.innerHTML = "";
            quizData[currentQ].options.forEach((opt, i) => {
                const btn = document.createElement('button');
                btn.innerText = opt; btn.className = 'btn';
                btn.onclick = () => {
                    if(i === quizData[currentQ].correct) {
                        resEl.innerText = "မှန်တယ် ချစ်လေး! ❤️";
                        resEl.style.color = "#2a9d8f";
                        currentQ++;
                        setTimeout(loadQuiz, 1000);
                        document.getElementById('myAudio').play().catch(() => {});
                    } else {
                        resEl.innerText = "မှားသွားပြီ... ပြန်စဉ်းစားကြည့်! 😜";
                        resEl.style.color = "#e76f51";
                    }
                };
                optEl.appendChild(btn);
            });
        } else {
            document.getElementById('quiz-container').innerHTML = "<h3>အကုန်မှန်တယ်! အရမ်းချစ်တယ်နော် ❤️</h3><p style='color:#ff4d6d; font-weight:bold;'>မင်းဟာ ကိုယ့်ရဲ့ ကမ္ဘာငယ်လေးပါ My Queen!</p>";
            startConfetti();
        }
    }

    function createHeart() {
        const heart = document.createElement('div');
        heart.className = 'heart';
        heart.innerHTML = ['❤️','💖','🌸','🌹'][Math.floor(Math.random()*4)];
        heart.style.left = Math.random() * 100 + 'vw';
        heart.style.animationDuration = (Math.random() * 3 + 2) + 's';
        document.body.appendChild(heart);
        setTimeout(() => heart.remove(), 5000);
    }

    function startConfetti() {
        for(let i=0; i<50; i++) {
            setTimeout(() => {
                const c = document.createElement('div');
                c.className = 'heart';
                c.innerHTML = ['✨','🎉','🌸'][Math.floor(Math.random()*3)];
                c.style.left = Math.random() * 100 + 'vw';
                c.style.animationDuration = (Math.random() * 2 + 1) + 's';
                document.body.appendChild(c);
                setTimeout(() => c.remove(), 2000);
            }, i * 100);
        }
    }

    const lyrics = "You are the best thing that ever happened to me... \nHappy Anniversary, my love!";
    let lIdx = 0;
    function typeLyrics() {
        const lyricsEl = document.getElementById('typing-lyrics');
        if(lIdx < lyrics.length) {
            lyricsEl.innerHTML += lyrics.charAt(lIdx) === '\n' ? '<br>' : lyrics.charAt(lIdx);
            lIdx++;
            setTimeout(typeLyrics, 70);
        }
    }

    setInterval(createHeart, 600);
    updateLogic();
    loadQuiz();
    setTimeout(typeLyrics, 1500);
</script>
</body>
</html>
